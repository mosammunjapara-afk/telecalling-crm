<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Thank You!</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans',sans-serif;min-height:100vh;background:linear-gradient(145deg,#0B0F1A,#0F1629);display:flex;align-items:center;justify-content:center;padding:20px}
.card{background:white;border-radius:24px;padding:50px 40px;max-width:480px;width:100%;text-align:center;box-shadow:0 40px 100px rgba(0,0,0,.4)}
.check{width:80px;height:80px;background:linear-gradient(135deg,#059669,#10B981);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:36px;margin:0 auto 24px;box-shadow:0 8px 24px rgba(5,150,105,.4);animation:pop .5s ease}
@keyframes pop{0%{transform:scale(0)}80%{transform:scale(1.1)}100%{transform:scale(1)}}
h1{font-family:'Syne',sans-serif;font-size:26px;font-weight:800;color:#0D1117;margin-bottom:8px}
.sub{color:#6B7280;font-size:15px;line-height:1.6;margin-bottom:28px}
.highlight{color:#2563EB;font-weight:700}
.info-box{background:#F0F7FF;border:1.5px solid #BFDBFE;border-radius:14px;padding:18px;margin-bottom:24px;text-align:left}
.info-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid #DBEAFE;font-size:13px}
.info-row:last-child{border:none}
.info-label{color:#64748B;font-weight:500}
.info-val{color:#1D4ED8;font-weight:700}
.btn{display:inline-block;padding:13px 28px;background:linear-gradient(135deg,#2563EB,#1D4ED8);color:white;border-radius:12px;text-decoration:none;font-weight:700;font-size:14px;transition:all .2s}
.btn:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(37,99,235,.4)}
</style>
</head>
<body>
<div class="card">
  <div class="check">✅</div>
  <h1>Shukriya, {{ name }}! 🎉</h1>
  <p class="sub">Aapka enquiry <span class="highlight">successfully submit</span> ho gaya. Hamare team ka executive aapko jald hi call karega!</p>
  <div class="info-box">
    <div class="info-row"><span class="info-label">👤 Naam</span><span class="info-val">{{ name }}</span></div>
    <div class="info-row"><span class="info-label">⏰ Expected Callback</span><span class="info-val">24 ghante mein</span></div>
    <div class="info-row"><span class="info-label">📱 Maध्यam</span><span class="info-val">Phone + WhatsApp</span></div>
  </div>
  <a href="/form" class="btn">➕Submit Another Enquiry</a>
</div>
</body>
</html>
