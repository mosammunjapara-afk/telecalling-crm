{% extends "base.html" %}
{% block title %}{% if edit %}Edit Lead{% else %}Add Lead{% endif %} — CRM{% endblock %}
{% block page_title %}{% if edit %}✏️ Edit Lead{% else %}➕ Add New Lead{% endif %}{% endblock %}
{% block content %}

<div style="max-width:560px;margin:0 auto">
<div class="card">
  <form method="POST">

    <div class="form-group">
      <label>Customer Name <span style="color:#EF4444">*</span></label>
      <input name="name" class="form-control" required placeholder="Customer's Full Name"
             value="{{ lead.name if lead else '' }}" autofocus>
    </div>

    <div class="form-group">
      <label>Phone Number <span style="color:#EF4444">*</span></label>
      <input name="phone" class="form-control" required placeholder="10-digit Phone number"
             inputmode="numeric" maxlength="12"
             value="{{ lead.phone if lead else '' }}"
             oninput="this.value=this.value.replace(/\D/g,'')">
    </div>

    <div class="form-group">
      <label>Email Address</label>
      <input name="email" type="email" class="form-control" placeholder="email@example.com"
             value="{{ lead.email if lead else '' }}">
    </div>

    <div class="form-group">
      <label>City</label>
      <input name="city" class="form-control" placeholder="e.g. Ahmedabad, Surat, Mumbai"
             value="{{ lead.city if lead else '' }}"
             oninput="this.value = this.value.replace(/\b\w/g, c => c.toUpperCase())">
    </div>

    <!-- Hidden required fields with defaults -->
    <input type="hidden" name="whatsapp" value="{{ lead.phone if lead else '' }}">
    <input type="hidden" name="source" value="Admin">
    <input type="hidden" name="product" value="{{ lead.product if lead else '' }}">
    <input type="hidden" name="budget" value="{{ lead.budget if lead else '' }}">
    <input type="hidden" name="address" value="{{ lead.address if lead else '' }}">
    <input type="hidden" name="notes" value="{{ lead.notes if lead else '' }}">
    <input type="hidden" name="status" value="{{ lead.status if lead else 'New' }}">
    {% if edit %}
    <input type="hidden" name="admin_status" value="{{ lead.admin_status if lead else 'Pending' }}">
    <input type="hidden" name="assigned_to" value="{{ lead.assigned_to if lead else '' }}">
    <input type="hidden" name="followup_date" value="{{ lead.followup_date if lead else '' }}">
    {% endif %}

    <div style="display:flex;gap:10px;justify-content:flex-end;margin-top:24px;padding-top:16px;border-top:1px solid var(--border)">
      <a href="/admin/leads" class="btn btn-ghost">Cancel</a>
      <button type="submit" class="btn btn-primary" style="padding:11px 28px">
        {% if edit %}💾 Update{% else %}✅ Add Lead{% endif %}
      </button>
    </div>
  </form>
</div>
</div>

{% endblock %}
